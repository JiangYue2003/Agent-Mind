# EchoMind 智能客服系统 — Docker Compose 服务编排
# 三级记忆架构：Redis（工作记忆）+ ChromaDB（情景记忆 + 用户画像）

services:

  # ── Redis 缓存（工作记忆）────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-echomind123}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-echomind123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB 向量数据库（情景记忆 + 用户画像）────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: echomind-chromadb
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb-data:/chroma/chroma
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Prometheus 监控 ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: echomind-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── 本地 BGE Reranker（GPU 推理）────────────────────────────────────────────
  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9.3
    profiles: ["tei"]
    container_name: echomind-reranker
    gpus: all
    command:
        - --model-id
        - BAAI/bge-reranker-v2-m3
        - --dtype
        - float16
        - --max-concurrent-requests
        - "4"
        - --max-batch-tokens
        - "8192"
        - --max-client-batch-size
        - "15"
    volumes:
      - reranker-model-cache:/data
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  # ── EchoMind 主应用 ─────────────────────────────────────────────────────────
  echomind:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echomind-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 容器内固定值，覆盖 .env 中的本地路径
      - REDIS_URL=redis://:${REDIS_PASSWORD:-echomind123}@redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - EVAL_BASELINE_PATH=/app/data/eval/baseline.json
      - RERANK_PROVIDER=tei
      - "RERANK_URL=${RERANK_URL:-http://host.docker.internal:18080/rerank}"
      - RAG_HYBRID_RECALL_K=20
      - RAG_RERANK_CANDIDATE_K=20
      - RAG_ANSWER_TOP_K=5
      - RAG_RERANK_TIMEOUT_SECONDS=20
      - RAG_RERANK_SCORE_THRESHOLD=0.05
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./data/eval:/app/data/eval
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── 按需 RAGAS 评测 ────────────────────────────────────────────────────────
  ragas-eval:
    profiles: ["eval"]
    build:
      context: .
      dockerfile: Dockerfile
      target: evaluation
    env_file:
      - .env
    environment:
      - EVAL_APP_BASE_URL=http://echomind:8000
      - EVAL_DATASET_PATH=/app/evaluation/datasets/customer_service_v1.jsonl
      - EVAL_WORKFLOW_DATASET=/app/evaluation/datasets/customer_service_workflow_v1.jsonl
      - EVAL_OUTPUT_DIR=/app/data/eval
      - EVAL_TOP_K=5
      - EVAL_RECALL_K=20
      - EVAL_RETRIEVAL_GOLD_PATH=/app/evaluation/datasets/customer_service_retrieval_gold_v2.json
      - EVAL_REQUIRE_RERANK=true
      - EVAL_REQUIRED_RERANK_PROVIDER=tei
      - EVAL_MAX_CONCURRENCY=3
    volumes:
      - ./evaluation/datasets:/app/evaluation/datasets:ro
      - ./data/eval:/app/data/eval
    depends_on:
      echomind:
        condition: service_healthy
    networks:
      - echomind-network
    entrypoint: ["python", "-m", "evaluation.ragas_runner"]

  # ── Nginx 反向代理 ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: echomind-nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      echomind:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── 网络 ────────────────────────────────────────────────────────────────────
networks:
  echomind-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── 数据卷 ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  chromadb-data:
  prometheus-data:
  reranker-model-cache:
  nginx-logs:
